    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="#0a0a0a"/>
  <rect x="96" y="96" width="832" height="832" rx="176" fill="url(#g)"/>
  <text x="512" y="512" font-family="Arial, Helvetica, sans-serif" font-size="560"
